<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AUDICOM Hub</title>
  <link rel="stylesheet" href="shared/style.css">

  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
  <script src="shared/firebase-init.js"></script>
  <script src="shared/auth-guard.js"></script>
  <script src="shared/utils.js"></script>

  <style>
    .hub-main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 24px 60px;
    }

    .hub-greeting {
      margin-bottom: 36px;
    }
    .hub-greeting h1 {
      font-size: 28px;
      font-weight: 600;
    }
    .hub-greeting p {
      color: var(--muted);
      font-size: 14px;
      margin-top: 4px;
    }

    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }

    .project-card {
      padding: 24px;
      text-decoration: none;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 140px;
    }
    .project-card .card-icon {
      font-size: 28px;
      line-height: 1;
    }
    .project-card .card-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }
    .project-card .card-desc {
      font-size: 12px;
      color: var(--muted);
      margin-top: auto;
    }

    .empty-state {
      text-align: center;
      padding: 60px 24px;
      color: var(--muted);
    }
    .empty-state svg { opacity: 0.3; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }

    .skeleton {
      background: linear-gradient(90deg, var(--card) 25%, rgba(255,255,255,0.07) 50%, var(--card) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
      border-radius: var(--radius);
      min-height: 140px;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }
  </style>
</head>
<body>

  <div class="page-loading" id="pageLoading">
    <div class="spinner"></div>
  </div>

  <nav class="navbar">
    <a href="hub.html" class="navbar-brand">AUDICOM <span>Hub</span></a>
    <div class="navbar-right">
      <span class="nav-user" id="navUserName"></span>
      <a href="admin.html" class="btn btn-ghost btn-sm" id="adminLink" style="display:none">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        Admin
      </a>
      <button class="btn btn-ghost btn-sm" onclick="fazerLogout()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sair
      </button>
    </div>
  </nav>

  <main class="hub-main">
    <div class="hub-greeting">
      <h1 id="greetingTitle">Carregando…</h1>
      <p id="greetingSubtitle"></p>
    </div>

    <div class="projects-grid" id="projectsGrid">
      <!-- Skeletons de carregamento -->
      <div class="skeleton glass"></div>
      <div class="skeleton glass"></div>
      <div class="skeleton glass"></div>
    </div>

    <div class="empty-state" id="emptyState" style="display:none">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
        <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
      </svg>
      <p>Você ainda não tem acesso a nenhum projeto.<br>Fale com um administrador.</p>
    </div>
  </main>

  <div class="toast" id="_toast"></div>

  <script>
    let currentUser = null;

    requireAuth().then(({ user, userData }) => {
      currentUser = userData;

      // Saudação
      const hora = new Date().getHours();
      const saudacao = hora < 12 ? 'Bom dia' : hora < 18 ? 'Boa tarde' : 'Boa noite';
      const nome = userData.name || userData.email;
      document.getElementById('greetingTitle').textContent = `${saudacao}, ${nome}`;
      document.getElementById('greetingSubtitle').textContent = 'Escolha um projeto para acessar.';
      document.getElementById('navUserName').textContent = nome;

      // Link admin
      if (userData.role === 'superadmin' || userData.role === 'admin') {
        document.getElementById('adminLink').style.display = 'inline-flex';
      }

      carregarProjetos(userData);
    });

    async function carregarProjetos(userData) {
      const grid      = document.getElementById('projectsGrid');
      const emptyEl   = document.getElementById('emptyState');
      const loadingEl = document.getElementById('pageLoading');
      const isSuperAdmin = userData.role === 'superadmin';
      const isAdmin      = userData.role === 'admin';

      try {
        // Sem where+orderBy juntos — evita exigir índice composto no Firestore
        const snap = await db.collection('projetos-lista').get();

        loadingEl.classList.add('hide');
        grid.innerHTML = '';

        // Filtra e ordena no cliente
        let projetos = [];
        snap.forEach(doc => projetos.push({ id: doc.id, ...doc.data() }));
        projetos = projetos
          .filter(p => p.enabled !== false)
          .sort((a, b) => (a.ordem || 0) - (b.ordem || 0));

        // Seed automático se admin abrir o hub com banco vazio
        if (projetos.length === 0 && (isSuperAdmin || isAdmin)) {
          await seedProjetos();
          return carregarProjetos(userData);
        }

        let count = 0;
        projetos.forEach(p => {
          const hasAccess = isSuperAdmin || isAdmin || (userData.projects && userData.projects[p.id]);
          if (!hasAccess) return;
          count++;
          grid.innerHTML += `
            <a href="${p.url || '#'}" class="project-card glass glass-hover">
              <div class="card-icon">${p.icon || '📁'}</div>
              <div class="card-name">${p.name}</div>
              <div class="card-desc">${p.desc || ''}</div>
            </a>`;
        });

        if (count === 0) {
          grid.style.display = 'none';
          emptyEl.style.display = 'block';
          if (isSuperAdmin || isAdmin) {
            emptyEl.innerHTML = `
              <p style="margin-bottom:16px">Nenhum projeto encontrado no banco de dados.</p>
              <a href="admin.html" class="btn btn-primary">Abrir painel admin para inicializar</a>`;
          }
        }
      } catch (err) {
        loadingEl.classList.add('hide');
        grid.innerHTML = '';
        // Mostra o erro visível na tela, não só no console
        emptyEl.style.display = 'block';
        emptyEl.innerHTML = `
          <p style="color:var(--danger);margin-bottom:8px">Erro ao carregar projetos:</p>
          <p style="font-size:12px;font-family:monospace;color:var(--muted)">${err.message}</p>`;
        console.error('carregarProjetos:', err);
      }
    }

    const PROJETOS_PADRAO = [
      { id: 'suporte-roteadores',      name: 'Suporte Roteadores',         icon: '🔧', url: 'projetos/suporte-roteadores/index.html',         desc: 'Guias técnicos de roteadores e equipamentos',     ordem: 1, enabled: true },
      { id: 'suporte-operacoes',       name: 'Suporte Operações',          icon: '📡', url: 'projetos/suporte-operacoes/index.html',          desc: 'Tutoriais e procedimentos de ativação de ONU',    ordem: 2, enabled: true },
      { id: 'sistema-chamados',        name: 'Sistema de Chamados',        icon: '🎫', url: 'projetos/sistema-chamados/index.html',           desc: 'Scripts e modelos para atendimento ao cliente',   ordem: 3, enabled: true },
      { id: 'analise-de-chats',        name: 'Análise de Chats',           icon: '💬', url: 'projetos/analise-de-chats/index.html',          desc: 'Análise de conversas com inteligência artificial', ordem: 4, enabled: true },
      { id: 'solicitacao-manutencoes', name: 'Solicitação de Manutenções', icon: '🔨', url: 'projetos/solicitação-manuntenções/index.html',  desc: 'Gestão de solicitações de manutenção técnica',    ordem: 5, enabled: true },
      { id: 'agregador-links',         name: 'Agregador de Links',         icon: '🔗', url: 'projetos/agregador-links/index.html',            desc: 'Links úteis organizados por abas editáveis',      ordem: 6, enabled: true },
    ];

    async function seedProjetos() {
      const batch = db.batch();
      PROJETOS_PADRAO.forEach(({ id, ...data }) => {
        batch.set(db.collection('projetos-lista').doc(id), data);
      });
      await batch.commit();
      showToast('Projetos criados automaticamente ✓', 'success');
    }
  </script>
</body>
</html>
